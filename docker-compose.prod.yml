name: fukurou

# Production compose for NAS deployment.
# The application image is built on GitHub Actions and pulled from GHCR.

services:
  # アプリ本体。外部公開ポートは持たず、cloudflared 経由でのみ到達させる。
  ktor:
    image: ghcr.io/matsumo0922/fukurou:${FUKUROU_IMAGE_TAG:?FUKUROU_IMAGE_TAG is required}
    container_name: fukurou-ktor
    restart: unless-stopped
    user: "10001:10004"
    read_only: true
    init: true
    pids_limit: 512
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_READ_SEARCH
      - SETGID
      - SETUID
      - SETPCAP
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777
      - /run/fukurou/llm-homes:rw,noexec,nosuid,nodev,mode=2750,uid=10001,gid=10004
      - /run/fukurou/mcp-manifests:rw,noexec,nosuid,nodev,mode=0700,uid=10001,gid=10004
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      FUKUROU_TRADING_SYMBOL: ${FUKUROU_TRADING_SYMBOL:-BTC}
      FUKUROU_TRADING_MODE: ${FUKUROU_TRADING_MODE:-PAPER}
      FUKUROU_PUBLIC_ORIGIN: ${FUKUROU_PUBLIC_ORIGIN:?FUKUROU_PUBLIC_ORIGIN is required}
      FUKUROU_GMO_PUBLIC_BASE_URL: ${FUKUROU_GMO_PUBLIC_BASE_URL:-https://api.coin.z.com/public}
      FUKUROU_GMO_PUBLIC_WEBSOCKET_URL: ${FUKUROU_GMO_PUBLIC_WEBSOCKET_URL:-wss://api.coin.z.com/ws/public/v1}
      FUKUROU_OBSIDIAN_VAULT_PATH: ${FUKUROU_OBSIDIAN_VAULT_PATH:-/vault}
      FUKUROU_MCP_JAR_PATH: /app/fukurou-mcp-all.jar
      FUKUROU_MCP_DB_USER: ${FUKUROU_MCP_DB_USER:-fukurou_mcp}
      FUKUROU_MCP_MANIFEST_DIRECTORY: /run/fukurou/mcp-manifests
      FUKUROU_MCP_SERVER_NAME: ${FUKUROU_MCP_SERVER_NAME:-fukurou-mcp}
      FUKUROU_MCP_SERVER_COMMAND: /usr/local/libexec/fukurou-mcp-launcher
      FUKUROU_REPOSITORY_ROOT: ${FUKUROU_REPOSITORY_ROOT:-/app}
      FUKUROU_LLM_WORKING_DIRECTORY: ${FUKUROU_LLM_WORKING_DIRECTORY:-/tmp/fukurou-llm}
      FUKUROU_CLAUDE_COMMAND_TEMPLATE: /usr/local/libexec/fukurou-llm-agent-launcher claude
      FUKUROU_CODEX_COMMAND_TEMPLATE: /usr/local/libexec/fukurou-llm-agent-launcher codex
      FUKUROU_CLAUDE_COMMON_ARGS: ${FUKUROU_CLAUDE_COMMON_ARGS:-}
      FUKUROU_CODEX_COMMON_ARGS: ${FUKUROU_CODEX_COMMON_ARGS:-}
      FUKUROU_CODEX_FALSIFIER_ARGS: ${FUKUROU_CODEX_FALSIFIER_ARGS:-}
      HOME: /tmp/fukurou-cli-home
    volumes:
      - llm-auth:/tmp/fukurou-cli-home
      - type: bind
        source: ${FUKUROU_MCP_DB_PASSWORD_FILE:?FUKUROU_MCP_DB_PASSWORD_FILE is required}
        target: /run/secrets/fukurou_mcp_db_password
        read_only: true
      - type: bind
        source: ${FUKUROU_OBSIDIAN_VAULT_PATH_HOST:-/srv/fukurou/obsidian-vault}
        target: /vault
    networks:
      - edge
      - data
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # PostgreSQL。記憶役。データは volume に永続化し、アプリ再デプロイで巻き込まない。
  postgres:
    image: postgres:16
    container_name: fukurou-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Cloudflare Tunnel コネクタ。外向き outbound のみで、ルータのポート開放は不要。
  # ingress（Public Hostname -> http://ktor:8080）は Cloudflare ダッシュボードで設定する。
  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    container_name: fukurou-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN}
    networks:
      - edge
    depends_on:
      - ktor
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  edge:
  data:

volumes:
  pgdata:
  llm-auth:
