name: fukurou

# Production compose for NAS deployment.
# The application image is built on GitHub Actions and pulled from GHCR.

services:
  # アプリ本体。外部公開ポートは持たず、cloudflared 経由でのみ到達させる。
  ktor:
    image: ghcr.io/matsumo0922/fukurou:${FUKUROU_IMAGE_TAG:?FUKUROU_IMAGE_TAG is required}
    container_name: fukurou-ktor
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      FUKUROU_TRADING_SYMBOL: ${FUKUROU_TRADING_SYMBOL:-BTC}
      FUKUROU_TRADING_MODE: ${FUKUROU_TRADING_MODE:-PAPER}
      FUKUROU_PAPER_INITIAL_CASH_JPY: ${FUKUROU_PAPER_INITIAL_CASH_JPY:-100000}
      FUKUROU_MARKET_SLIPPAGE_BPS: ${FUKUROU_MARKET_SLIPPAGE_BPS:-5}
      FUKUROU_MARKET_SLIPPAGE_RESERVE_BPS: ${FUKUROU_MARKET_SLIPPAGE_RESERVE_BPS:-5}
      FUKUROU_FALLBACK_MAKER_FEE_RATE: ${FUKUROU_FALLBACK_MAKER_FEE_RATE:--0.0001}
      FUKUROU_FALLBACK_TAKER_FEE_RATE: ${FUKUROU_FALLBACK_TAKER_FEE_RATE:-0.0005}
      FUKUROU_FALLBACK_SPREAD_BPS: ${FUKUROU_FALLBACK_SPREAD_BPS:-2.0}
      FUKUROU_MAX_RISK_PER_TRADE_RATIO: ${FUKUROU_MAX_RISK_PER_TRADE_RATIO:-0.02}
      FUKUROU_MAX_DRAWDOWN_RATIO: ${FUKUROU_MAX_DRAWDOWN_RATIO:--0.15}
      FUKUROU_MAX_TOTAL_EXPOSURE_RATIO: ${FUKUROU_MAX_TOTAL_EXPOSURE_RATIO:-0.80}
      FUKUROU_MIN_EXPECTED_VALUE_R: ${FUKUROU_MIN_EXPECTED_VALUE_R:-0.10}
      FUKUROU_MIN_EXPECTED_MOVE_TO_COST_RATIO: ${FUKUROU_MIN_EXPECTED_MOVE_TO_COST_RATIO:-3.0}
      FUKUROU_MAX_TAKER_FEE_RATIO: ${FUKUROU_MAX_TAKER_FEE_RATIO:-0.0010}
      FUKUROU_GMO_PUBLIC_BASE_URL: ${FUKUROU_GMO_PUBLIC_BASE_URL:-https://api.coin.z.com/public}
      FUKUROU_GMO_PUBLIC_REST_PER_SECOND: ${FUKUROU_GMO_PUBLIC_REST_PER_SECOND:-10}
      FUKUROU_GMO_PUBLIC_REST_BURST: ${FUKUROU_GMO_PUBLIC_REST_BURST:-10}
      FUKUROU_GMO_RETRY_MAX_ATTEMPTS: ${FUKUROU_GMO_RETRY_MAX_ATTEMPTS:-3}
      FUKUROU_GMO_RETRY_INITIAL_BACKOFF_MS: ${FUKUROU_GMO_RETRY_INITIAL_BACKOFF_MS:-200}
      FUKUROU_GMO_RETRY_MAX_BACKOFF_MS: ${FUKUROU_GMO_RETRY_MAX_BACKOFF_MS:-2000}
      FUKUROU_GMO_RETRY_BACKOFF_MULTIPLIER: ${FUKUROU_GMO_RETRY_BACKOFF_MULTIPLIER:-2}
      FUKUROU_GMO_CONNECT_TIMEOUT_MS: ${FUKUROU_GMO_CONNECT_TIMEOUT_MS:-5000}
      FUKUROU_GMO_REQUEST_TIMEOUT_MS: ${FUKUROU_GMO_REQUEST_TIMEOUT_MS:-10000}
      FUKUROU_GMO_SYMBOL_RULES_CACHE_TTL_SECONDS: ${FUKUROU_GMO_SYMBOL_RULES_CACHE_TTL_SECONDS:-600}
      FUKUROU_MCP_TOTAL_TOOL_CALL_LIMIT: ${FUKUROU_MCP_TOTAL_TOOL_CALL_LIMIT:-48}
      FUKUROU_MCP_ACT_TOOL_CALL_LIMIT: ${FUKUROU_MCP_ACT_TOOL_CALL_LIMIT:-3}
      FUKUROU_LLM_RUN_TIMEOUT_SECONDS: ${FUKUROU_LLM_RUN_TIMEOUT_SECONDS:-180}
      FUKUROU_LLM_MAX_INVOCATIONS_PER_HOUR: ${FUKUROU_LLM_MAX_INVOCATIONS_PER_HOUR:-4}
      FUKUROU_LLM_MAX_INVOCATIONS_PER_DAY: ${FUKUROU_LLM_MAX_INVOCATIONS_PER_DAY:-96}
      FUKUROU_LLM_DAEMON_ENABLED: ${FUKUROU_LLM_DAEMON_ENABLED:-true}
      FUKUROU_LLM_DAEMON_POLL_SECONDS: ${FUKUROU_LLM_DAEMON_POLL_SECONDS:-60}
      FUKUROU_LLM_FLAT_HEARTBEAT_SECONDS: ${FUKUROU_LLM_FLAT_HEARTBEAT_SECONDS:-900}
      FUKUROU_LLM_HOLDING_CHECK_SECONDS: ${FUKUROU_LLM_HOLDING_CHECK_SECONDS:-900}
      FUKUROU_OBSIDIAN_ENABLED: ${FUKUROU_OBSIDIAN_ENABLED:-false}
      FUKUROU_OBSIDIAN_VAULT_PATH: ${FUKUROU_OBSIDIAN_VAULT_PATH:-/vault}
      FUKUROU_OBSIDIAN_WRITE_INTERVAL_SECONDS: ${FUKUROU_OBSIDIAN_WRITE_INTERVAL_SECONDS:-300}
      FUKUROU_ECONOMIC_EVENT_BLACKOUTS_UTC: ${FUKUROU_ECONOMIC_EVENT_BLACKOUTS_UTC:-}
      FUKUROU_MCP_JAR_PATH: ${FUKUROU_MCP_JAR_PATH:-/app/fukurou-mcp-all.jar}
      FUKUROU_MCP_SERVER_NAME: ${FUKUROU_MCP_SERVER_NAME:-fukurou-mcp}
      FUKUROU_MCP_SERVER_COMMAND: ${FUKUROU_MCP_SERVER_COMMAND:-java}
      FUKUROU_MCP_SERVER_ARGS: ${FUKUROU_MCP_SERVER_ARGS:-}
      FUKUROU_REPOSITORY_ROOT: ${FUKUROU_REPOSITORY_ROOT:-/app}
      FUKUROU_LLM_WORKING_DIRECTORY: ${FUKUROU_LLM_WORKING_DIRECTORY:-/tmp/fukurou-llm}
      FUKUROU_CLAUDE_COMMAND_TEMPLATE: ${FUKUROU_CLAUDE_COMMAND_TEMPLATE:-claude}
      FUKUROU_CODEX_COMMAND_TEMPLATE: ${FUKUROU_CODEX_COMMAND_TEMPLATE:-codex}
      FUKUROU_CLAUDE_MODEL: ${FUKUROU_CLAUDE_MODEL:-}
      FUKUROU_CODEX_MODEL: ${FUKUROU_CODEX_MODEL:-}
      FUKUROU_PROPOSER_ALLOWED_TOOLS: ${FUKUROU_PROPOSER_ALLOWED_TOOLS:-}
      FUKUROU_FALSIFIER_ALLOWED_TOOLS: ${FUKUROU_FALSIFIER_ALLOWED_TOOLS:-}
      FUKUROU_CLAUDE_COMMON_ARGS: ${FUKUROU_CLAUDE_COMMON_ARGS:-}
      FUKUROU_CODEX_COMMON_ARGS: ${FUKUROU_CODEX_COMMON_ARGS:-}
      FUKUROU_CODEX_FALSIFIER_ARGS: ${FUKUROU_CODEX_FALSIFIER_ARGS:-}
      FUKUROU_CODEX_PERSISTENT_HOME: /tmp/fukurou-cli-home/.codex
      HOME: /tmp/fukurou-cli-home
      XDG_CACHE_HOME: /tmp/fukurou-cli-cache
    volumes:
      - llm-home:/tmp/fukurou-cli-home
      - llm-cache:/tmp/fukurou-cli-cache
      - type: bind
        source: ${FUKUROU_OBSIDIAN_VAULT_PATH_HOST:-/srv/fukurou/obsidian-vault}
        target: /vault
    networks:
      - edge
      - data
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # PostgreSQL。記憶役。データは volume に永続化し、アプリ再デプロイで巻き込まない。
  postgres:
    image: postgres:16
    container_name: fukurou-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Cloudflare Tunnel コネクタ。外向き outbound のみで、ルータのポート開放は不要。
  # ingress（Public Hostname -> http://ktor:8080）は Cloudflare ダッシュボードで設定する。
  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    container_name: fukurou-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN}
    networks:
      - edge
    depends_on:
      - ktor
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  edge:
  data:

volumes:
  pgdata:
  llm-home:
  llm-cache:
