name: Deploy validation

on:
  pull_request:
    paths:
      - ".github/workflows/deploy*.yml"
      - ".env.example"
      - "docker-compose.prod.yml"
      - "scripts/deploy/**"
      - "scripts/backup/**"
      - "scripts/deploy/sql/deploy-foundation-v1.sql"
      - "fukurou/src/test/kotlin/me/matsumo/fukurou/ReleaseDeployFoundationContractTest.kt"
      - "fukurou/src/test/kotlin/me/matsumo/fukurou/DatabaseBackupRestoreContractTest.kt"
      - "fukurou/src/main/kotlin/me/matsumo/fukurou/EvaluationReportPersistence.kt"
      - "trading/src/main/kotlin/me/matsumo/fukurou/trading/persistence/TradingPersistenceBootstrap.kt"
      - "trading/src/main/kotlin/me/matsumo/fukurou/trading/persistence/TradingTables.kt"
      - "docs/deploy.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-contract:
    name: Deploy contract and PostgreSQL 16
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell syntax
        run: >-
          bash -n
          scripts/deploy/deploy-fukurou
          scripts/deploy/deploy-intent-resolver
          scripts/deploy/deploy-intent-resolver-selftest
          scripts/deploy/fukurou-deploy-db
          scripts/deploy/deploy-contract-selftest
          scripts/deploy/deploy-runtime-selftest
          scripts/deploy/deploy-db-selftest
          scripts/deploy/deploy-postgres-selftest
          scripts/deploy/canary-compose-selftest
          scripts/deploy/deploy-e2e-selftest

      - name: Run deploy semantic selftests
        run: |
          scripts/deploy/deploy-intent-resolver-selftest
          scripts/deploy/deploy-contract-selftest
          scripts/deploy/deploy-runtime-selftest
          scripts/deploy/deploy-db-selftest
          scripts/deploy/deploy-postgres-selftest
          scripts/deploy/canary-compose-selftest

      - name: Install backup validation tools
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client restic

      - name: Validate backup and restore contracts
        run: |
          bash -n \
            scripts/backup/backup-common \
            scripts/backup/backup-fukurou \
            scripts/backup/backup-selftest \
            scripts/backup/backup-postgres-selftest \
            scripts/backup/install-fukurou-backup \
            scripts/backup/install-selftest \
            scripts/backup/monitoring-projection-selftest \
            scripts/backup/publish-backup-monitoring \
            scripts/backup/restore-fukurou \
            scripts/backup/restore-selftest
          scripts/backup/backup-selftest
          scripts/backup/install-selftest
          scripts/backup/monitoring-projection-selftest
          scripts/backup/restore-selftest
          sudo env FUKUROU_BACKUP_POSTGRES_SELFTEST_REQUIRE=true scripts/backup/backup-postgres-selftest

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run file-level deploy contract test
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/gradle-deploy-validation
        run: >-
          ./gradlew :fukurou:test
          --tests me.matsumo.fukurou.ReleaseDeployFoundationContractTest
          --tests me.matsumo.fukurou.DatabaseBackupRestoreContractTest
