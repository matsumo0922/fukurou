name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Commit SHA on main to build and deploy. Leave empty to use the workflow ref."
        required: false
        type: string

permissions: {}

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/matsumo0922/fukurou
  PRODUCTION_REVISION_URL: https://fukurou.matsumo.me/revision

jobs:
  resolve:
    name: Resolve deploy target
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      deploy_sha: ${{ steps.resolve.outputs.deploy_sha }}
      workflow_event: ${{ steps.resolve.outputs.workflow_event }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve deploy SHA
        id: resolve
        shell: bash
        env:
          INPUT_IMAGE_SHA: ${{ inputs.image_sha }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CLOUDFLARED_TUNNEL_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CLOUDFLARED_TUNNEL_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          requested_sha="${INPUT_IMAGE_SHA:-${GITHUB_SHA}}"
          deploy_sha="$(git rev-parse --verify "${requested_sha}^{commit}")"
          [[ "${deploy_sha}" =~ ^[0-9a-f]{40}$ ]]
          git merge-base --is-ancestor "${deploy_sha}" origin/main

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            # このチェックは fast-fail の最適化に過ぎない。正本の descendant check は
            # deploy-fukurou が NAS 上の docker state を直接見て行う（外部ネットワークに
            # 依存しない）。本番 /revision に到達できない場合（＝まさに hotfix push が
            # 必要な障害時である可能性がある）は、ここでは deploy を止めずスキップする。
            curl_args=(-fsS --retry 2 --retry-all-errors)
            if [[ -n "${CF_ACCESS_CLIENT_ID}" && -n "${CF_ACCESS_CLIENT_SECRET}" ]]; then
              curl_args+=(
                -H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}"
                -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}"
              )
            fi
            if revision_response="$(curl "${curl_args[@]}" "${PRODUCTION_REVISION_URL}" 2>/dev/null)" &&
              [[ "${revision_response}" =~ ([0-9a-f]{40}) ]]; then
              current_revision="${BASH_REMATCH[1]}"
              if git cat-file -e "${current_revision}^{commit}" 2>/dev/null; then
                git merge-base --is-ancestor "${current_revision}" "${deploy_sha}" || {
                  echo "::error::Push target is not a descendant of production revision ${current_revision}"
                  exit 1
                }
              else
                echo "::warning::Production revision ${current_revision} is not a known commit; skipping fast-fail check"
              fi
            else
              echo "::warning::Production revision endpoint is unavailable; skipping fast-fail check (authoritative check runs on the NAS executor)"
            fi
          fi

          echo "deploy_sha=${deploy_sha}" >> "${GITHUB_OUTPUT}"
          echo "workflow_event=${GITHUB_EVENT_NAME}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build image
    needs: resolve
    runs-on: ubuntu-latest
    concurrency:
      group: fukurou-build-${{ needs.resolve.outputs.deploy_sha }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
    outputs:
      deploy_sha: ${{ needs.resolve.outputs.deploy_sha }}
      image_digest: ${{ steps.build_push.outputs.digest }}
    steps:
      - name: Checkout exact deploy target
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.deploy_sha }}

      - name: Verify exact target checkout
        shell: bash
        env:
          EXPECTED_SHA: ${{ needs.resolve.outputs.deploy_sha }}
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "${EXPECTED_SHA}" ]]

      - name: Resolve image tags
        id: image_tags
        shell: bash
        run: |
          set -euo pipefail

          tags="${IMAGE_NAME}:${{ needs.resolve.outputs.deploy_sha }}"
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:main"
          fi

          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}
          build-args: |
            FUKUROU_REVISION=${{ needs.resolve.outputs.deploy_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on NAS
    needs: [resolve, build]
    concurrency:
      group: fukurou-production-deploy
      cancel-in-progress: false
    timeout-minutes: 60
    runs-on:
      - self-hosted
      - fukurou-prod
    permissions: {}
    steps:
      - name: Deploy pinned image
        run: >-
          sudo /usr/local/sbin/deploy-fukurou
          --event "${{ needs.resolve.outputs.workflow_event }}"
          --image-digest "${{ needs.build.outputs.image_digest }}"
          --deployment-id "github-${{ github.run_id }}-${{ github.run_attempt }}"
          "${{ needs.build.outputs.deploy_sha }}"
