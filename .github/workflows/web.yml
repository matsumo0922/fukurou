name: Web Checks

on:
  pull_request:
    paths:
      - ".github/workflows/web.yml"
      - "web/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    name: Typecheck, lint, and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
