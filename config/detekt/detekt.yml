# Agents リポジトリの rules/lint/detekt.yml をベースにした fukurou 用 detekt 設定
# 前提バージョン: detekt 1.23.8 / detekt-formatting
# JVM バックエンドのため Compose ruleset は含めない

complexity:
  active: true
  # 論理演算子2つ以上（条件3つ以上）の条件式を検出する。Boolean 変数への切り出し方は rules/kotlin.md を参照
  ComplexCondition:
    active: true
    threshold: 3
  LongMethod:
    active: true
    excludes:
      - '**/src/test/**'
    # Composable は UI 構造の記述で行数が伸びるため除外
    ignoreAnnotated:
      - 'Composable'
  LongParameterList:
    active: true
    excludes:
      - '**/src/test/**'
    ignoreDefaultParameters: true
    # Composable は引数が多くなる設計のため除外
    ignoreAnnotated:
      - 'Composable'
  TooManyFunctions:
    active: true
    excludes:
      - '**/src/test/**'
    # 小さな private Composable へ分割するスタイルと衝突するため private は数えない
    ignorePrivate: true
  LargeClass:
    active: true
    excludes:
      - '**/src/test/**'

coroutines:
  active: true

empty-blocks:
  active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    # 認証系ライブラリが Throwable などを投げるため無効化。導入プロジェクトで検出量を確認の上、有効化を検討する
    active: false

naming:
  active: true
  FunctionNaming:
    ignoreAnnotated:
      - 'Composable'
  MatchingDeclarationName:
    active: false
  PackageNaming:
    active: false
  TopLevelPropertyNaming:
    active: false
  # 一文字変数を検出する（`i` ではなく `index`）。命名の意味づけは rules/kotlin.md を参照
  VariableMinLength:
    active: true
    minimumVariableNameLength: 2

performance:
  active: true
  SpreadOperator:
    active: false

style:
  active: true
  MaxLineLength:
    active: false
  MagicNumber:
    active: false
  ReturnCount:
    # 早期 return を多用するスタイルのため無効化
    active: false
  ThrowsCount:
    active: false
  LoopWithTooManyJumpStatements:
    active: false
  ForbiddenComment:
    # 開発時のコメントを削除する必要はないため無効化
    active: false
  DestructuringDeclarationWithTooManyEntries:
    # Compose の ConstraintLayout#createRefs などで用いるため無効化
    active: false
  # 空のコレクションは emptyList() などの empty 系で生成する
  UseEmptyCounterpart:
    active: true
  # プロパティ、メソッド、companion object の順序を強制する
  ClassOrdering:
    active: true
  # 複数行の for / while に中括弧を強制する
  MandatoryBracesLoops:
    active: true
  # メソッドチェーンは1行に2呼び出しまで。3呼び出し以上は改行する
  MaxChainedCallsOnSameLine:
    active: true
    maxChainedCalls: 2
  UnusedPrivateMember:
    active: true
    # Compose の Preview 関数と Test でモックしているものは無効化
    ignoreAnnotated:
      - 'RelaxedMockK'
      - 'InjectMockKs'
      - 'Preview'

comments:
  # UndocumentedPublicClass は Activity / Fragment / Dialog / ViewModel をクラス名で除外できないため使わない。
  # KDoc の規約（対象クラスと日本語での記述）は rules/kotlin.md で扱う
  active: false

potential-bugs:
  active: true
  UnsafeCallOnNullableType:
    # `!!` を許容している。導入プロジェクトで検出量を確認の上、有効化を検討する
    active: false

formatting:
  active: true
  autoCorrect: true
  MaximumLineLength:
    active: false
  # 引数の折り返しは行長ではなく引数の数で判断するため無効化し、FunctionSignature で強制する
  ArgumentListWrapping:
    active: false
  ParameterListWrapping:
    active: false
  # 引数3つ以上の関数定義を複数行に強制する。引数2つまでの1行定義の規約は rules/kotlin.md を参照
  FunctionSignature:
    active: true
    forceMultilineWhenParameterCountGreaterOrEqualThan: 3
  NoWildcardImports:
    # style ルールセットの WildcardImport で検出するため、二重報告を避けて無効化
    active: false
  # 定義箇所での trailing comma を強制する
  TrailingCommaOnDeclarationSite:
    active: true
  # 呼び出し箇所での trailing comma を強制する
  TrailingCommaOnCallSite:
    active: true
  PackageName:
    active: false
  Filename:
    active: false
